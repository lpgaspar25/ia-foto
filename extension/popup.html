<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 380px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f1117;
  color: #e4e4e7;
  padding: 16px;
}
h1 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #a78bfa;
}
.status {
  font-size: 13px;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 12px;
  line-height: 1.4;
}
.status.loading { background: rgba(139,92,246,0.1); color: #a78bfa; }
.status.success { background: rgba(16,185,129,0.1); color: #10b981; }
.status.error { background: rgba(239,68,68,0.1); color: #ef4444; }
.product-preview {
  background: #1a1b23;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 12px;
}
.product-preview h2 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #e4e4e7;
}
.product-preview .meta {
  font-size: 11px;
  color: #71717a;
  margin-bottom: 8px;
}
.product-preview .desc-preview {
  font-size: 12px;
  color: #a1a1aa;
  max-height: 60px;
  overflow: hidden;
  margin-bottom: 8px;
  line-height: 1.4;
}
.img-grid {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.img-grid img {
  width: 56px;
  height: 56px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid #27272a;
}
.img-grid .more {
  width: 56px;
  height: 56px;
  border-radius: 6px;
  background: #27272a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #a1a1aa;
}
.btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: #7c3aed; color: white; }
.btn-send { background: #10b981; color: white; margin-top: 8px; }
.btn-secondary {
  background: transparent;
  color: #a1a1aa;
  border: 1px solid #27272a;
  margin-top: 6px;
  font-weight: 400;
}
#extractResult { display: none; }
.server-url {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}
.server-url input {
  flex: 1;
  background: #1a1b23;
  border: 1px solid #27272a;
  border-radius: 6px;
  color: #e4e4e7;
  padding: 8px 10px;
  font-size: 12px;
  outline: none;
}
.server-url input:focus { border-color: #7c3aed; }
.server-url button {
  background: #27272a;
  border: none;
  border-radius: 6px;
  color: #a1a1aa;
  padding: 8px 10px;
  font-size: 11px;
  cursor: pointer;
}
</style>
</head>
<body>
  <h1>Image Tools - Extrator</h1>

  <div class="server-url">
    <input type="text" id="serverUrl" placeholder="URL do seu Image Tools" value="https://web-production-fff15.up.railway.app">
    <button onclick="saveServerUrl()">Salvar</button>
  </div>

  <div id="statusMsg" class="status loading">
    Clique no botao abaixo para extrair o produto desta pagina.
  </div>

  <button class="btn btn-primary" id="btnExtract" onclick="extractProduct()">
    Extrair Produto desta Pagina
  </button>

  <div id="extractResult">
    <div class="product-preview">
      <h2 id="prevTitle"></h2>
      <div class="meta" id="prevMeta"></div>
      <div class="desc-preview" id="prevDesc"></div>
      <div class="img-grid" id="prevImages"></div>
    </div>

    <button class="btn btn-send" id="btnSend" onclick="sendToApp()">
      Enviar para Image Tools
    </button>

    <button class="btn btn-secondary" onclick="extractProduct()">
      Extrair Novamente
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
